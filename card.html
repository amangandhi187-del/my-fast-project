<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Card</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebe1 0%, #d4a5ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            width: 300px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #74ebe1;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin: 0 0 10px 0;
        }
        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            background: #d4a5ec;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">😎</div>
        <h1>Aman Gandhi</h1>
        <p>Web Developer & Tech Enthusiast</p>
        <a href="https://github.com/amangandhi187-del" class="btn" target="_blank">My GitHub</a>
        <a href="https://www.instagram.com/mr_gandhi_9595" class="btn" target="_blank">Instagram</a>target="_blank"
        <a href="#" class="btn">Contact Me</a>
    </div>

</body>
</html>
