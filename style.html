<!DOCTYPE html>
<html>
<head>
    <title>My First Project - Styled</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #2f3542;
            margin-bottom: 10px;
        }
        p {
            color: #57606f;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello, GitHub!</h1> 
        <p>This is my new styled page.</p>
    </div>
</body>
</html>
